name: AI News Radar

on:
  pull_request:
    branches:
      - master
    paths:
      - ".github/workflows/ai-news-radar.yml"
      - "scripts/ai_news_radar.py"
      - "scripts/ai_news_radar_smoke_test.py"
      - "scripts/send_ai_news_radar_email.py"
      - "config/source_strategy.yaml"
      - "feeds/follow.example.opml"
  push:
    branches:
      - master
      - refactor/ai-news-radar-architecture
    paths:
      - ".github/workflows/ai-news-radar.yml"
      - "scripts/ai_news_radar.py"
      - "scripts/ai_news_radar_smoke_test.py"
      - "scripts/send_ai_news_radar_email.py"
      - "config/source_strategy.yaml"
      - "feeds/follow.example.opml"
      - "docs/AI_NEWS_RADAR_REFACTOR.md"
      - "skills/ai-news-radar/**"
      - "index.html"
  schedule:
    - cron: "0 0 * * *"
    - cron: "45 3 * * *"
    - cron: "30 6 * * *"
    - cron: "30 8 * * *"
    - cron: "0 14 * * *"
  workflow_dispatch:
    inputs:
      window_hours:
        description: "News window in hours"
        required: false
        default: "24"
      min_relevance_score:
        description: "Minimum AI relevance score"
        required: false
        default: "2"

concurrency:
  group: ai-news-radar-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.12"

jobs:
  update-ai-news-radar:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: uv sync --frozen --no-dev
      - name: Run offline smoke test
        run: uv run python scripts/ai_news_radar_smoke_test.py
      - name: Run AI News Radar pipeline
        env:
          FOLLOW_OPML_B64: ${{ secrets.FOLLOW_OPML_B64 }}
        run: |
          WINDOW_HOURS="${{ github.event.inputs.window_hours || '24' }}"
          MIN_SCORE="${{ github.event.inputs.min_relevance_score || '2' }}"
          uv run python scripts/ai_news_radar.py \
            --config config/source_strategy.yaml \
            --output-dir data \
            --report-dir reports \
            --window-hours "$WINDOW_HOURS" \
            --min-relevance-score "$MIN_SCORE"
      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-news-radar-report
          path: |
            reports/latest.html
            reports/ai-news-radar.html
            data/ai-news-radar.json
            data/latest-ai-news-radar.json
          if-no-files-found: error
          retention-days: 14
      - name: Send email digest
        if: github.event_name != 'pull_request'
        env:
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_SMTP_SERVER: ${{ secrets.EMAIL_SMTP_SERVER }}
          EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
        run: uv run python scripts/send_ai_news_radar_email.py
      - name: Write run summary
        run: |
          uv run python - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = json.loads(Path('data/ai-news-radar.json').read_text(encoding='utf-8'))
          items = payload.get('items', [])
          groups = payload.get('groups', {})
          lines = []
          lines.append('# AI News Radar result')
          lines.append('')
          lines.append(f"- Generated at: `{payload.get('generated_at')}`")
          lines.append(f"- Window hours: `{payload.get('window_hours')}`")
          lines.append(f"- Items: `{payload.get('item_count')}`")
          lines.append(f"- Healthy sources: `{payload.get('healthy_source_count')}/{payload.get('source_count')}`")
          lines.append('')
          lines.append('## Output files')
          lines.append('')
          lines.append('- `data/ai-news-radar.json`')
          lines.append('- `reports/latest.html`')
          lines.append('- Artifact: `ai-news-radar-report`')
          lines.append('')
          lines.append('## Groups')
          lines.append('')
          for name, group in groups.items():
              lines.append(f"- `{name}`: {group.get('count', 0)}")
          lines.append('')
          lines.append('## Top items')
          lines.append('')
          for item in items[:10]:
              title = item.get('title', '')
              source = item.get('source_name', '')
              score = item.get('relevance_score', '')
              url = item.get('url', '')
              lines.append(f"- [{title}]({url}) — {source}, score {score}")
          Path(os.environ['GITHUB_STEP_SUMMARY']).write_text('\n'.join(lines), encoding='utf-8')
          PY
      - name: Commit generated radar artifacts
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ai-news-radar.json data/latest-ai-news-radar.json reports/ai-news-radar.html reports/latest.html index.html
          if git diff --cached --quiet; then
            echo "No AI News Radar changes to commit."
          else
            git commit -m "Update AI news radar artifacts"
            git push
          fi
